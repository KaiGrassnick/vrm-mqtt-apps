- triggers:
    - trigger: time_pattern
      seconds: "/5"
  sensor:
    - name: VRM Installations PV Power
      unique_id: vrm_installations_pv_power
      device_class: power
      unit_of_measurement: W
      state_class: measurement
      icon: mdi:solar-power
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_pv_power$') | map(attribute='state') | map('float', 0) | sum | round(0) }}

    - name: VRM Installations Grid Power
      unique_id: vrm_installations_grid_power
      device_class: power
      unit_of_measurement: W
      state_class: measurement
      icon: mdi:transmission-tower
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_ac_grid_power$') | map(attribute='state') | map('float', 0) | sum | round(0) }}

    - name: VRM Installations Genset Power
      unique_id: vrm_installations_genset_power
      device_class: power
      unit_of_measurement: W
      state_class: measurement
      icon: mdi:generator-portable
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_ac_genset_power$') | map(attribute='state') | map('float', 0) | sum | round(0) }}

    - name: VRM Installations Load Power
      unique_id: vrm_installations_load_power
      device_class: power
      unit_of_measurement: W
      state_class: measurement
      icon: mdi:home-lightning-bolt
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_ac_consumption_power$') | map(attribute='state') | map('float', 0) | sum | round(0) }}

    - name: VRM Installations Total
      unique_id: vrm_installations_total
      icon: mdi:counter
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_ac_grid_power$') | list | count }}

    - name: VRM Installations Online
      unique_id: vrm_installations_online
      icon: mdi:check-network
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_ac_grid_power$') | rejectattr('state', 'eq', 'unavailable') | list | count }}

    - name: VRM Installations Offline
      unique_id: vrm_installations_offline
      icon: mdi:close-network
      state: >-
        {{ states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_custom_aggregate_ac_grid_power$') | selectattr('state', 'eq', 'unavailable') | list | count }}

    - name: VRM Installations Status
      unique_id: vrm_installations_status
      icon: mdi:check-network-outline
      state: >-
        {{ states('sensor.vrm_installations_online') ~ ' / ' ~ states('sensor.vrm_installations_total') ~ ' online' }}

    - name: VRM Installations SoC Average
      unique_id: vrm_installations_soc_avg
      device_class: battery
      unit_of_measurement: '%'
      state_class: measurement
      icon: mdi:battery-medium
      state: >-
        {% set ns = namespace(soc_values = states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_system_0_dc_battery_soc$') | map(attribute='state') | map('float', 0) | reject('equalto', 0) | list) %}
        {% if ns.soc_values | count > 0 %}
          {{ (ns.soc_values | sum / (ns.soc_values | count)) | round(0) }}
        {% else %}
          0
        {% endif %}

    - name: VRM Installations Battery Voltage Average
      unique_id: vrm_installations_battery_voltage_avg
      device_class: voltage
      unit_of_measurement: V
      state_class: measurement
      icon: mdi:car-battery
      state: >-
        {% set ns = namespace(voltages = states | selectattr('entity_id', 'match', '^sensor\.vrm_.+_system_0_dc_battery_voltage$') | map(attribute='state') | map('float', 0) | reject('equalto', 0) | list) %}
        {% if ns.voltages | count > 0 %}
          {{ (ns.voltages | sum / (ns.voltages | count)) | round(2) }}
        {% else %}
          0
        {% endif %}