views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: custom:flex-table-card
            title: VRM Installations
            action: script.vrm_installations_table
            entities:
              - sensor.vrm_installations
            auto_format: false
            sort_by: installations.name+
            display_footer: true
            columns:
              - name: Status
                data: installations.online
                align: center
                modify: "x ? `<ha-icon icon='mdi:access-point' style='color: #4caf50'></ha-icon>` : `<ha-icon icon='mdi:alert-rhombus' style='color: #f44336'></ha-icon>`"
              - name: Installation
                data: installations.name
                align: left
                footer_type: count
                footer_modify: "'Total (' + x + ')'"
              - name: SoC
                data: installations.soc
                align: right
                suffix: " %"
                modify: Math.round(x)
                footer_type: average
                footer_modify: Math.round(x)
              - name: Battery Voltage
                data: installations.battery_voltage
                align: right
                suffix: " V"
                modify: parseFloat(x).toFixed(2)
                footer_type: average
                footer_modify: parseFloat(x).toFixed(2)
              - name: Solar
                data: installations.pv
                align: right
                suffix: " W"
                modify: Math.round(x)
                footer_type: sum
              - name: Netz
                data: installations.grid
                align: right
                suffix: " W"
                modify: Math.round(x)
                footer_type: sum
              - name: Last
                data: installations.load
                align: right
                suffix: " W"
                modify: Math.round(x)
                footer_type: sum
              - name: Generator
                data: installations.genset
                align: right
                suffix: " W"
                modify: Math.round(x)
                footer_type: sum
            css:
              table: "display: grid;"
              thead, tbody, tfoot: "display: contents;"
              tr: >-
                display: grid; grid-template-columns: 0.3fr 2fr 1fr 1fr 1fr 1fr 1fr 1fr;
              thead tr: "order: 1; margin-bottom: 16px;"
              tbody tr: "order: 3;"
              tfoot tr: >-
                order: 2; background-color: rgba(125, 125, 125, 0.4);
                font-weight: 600; border-style: none;
                padding: 4px 0;
                margin-top: 4px;
              tfoot tr td:first-child: "text-align: left;"
        column_span: 4
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_status
        name: Installations
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_online
        name: Online
        icon: mdi:access-point
        color: green
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_offline
        name: Offline
        icon: mdi:alert-rhombus
        color: red
        show_entity_picture: false
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_total
        name: Total
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_soc_average
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_battery_voltage_average
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_pv_power
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_grid_power
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_load_power
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.vrm_installations_genset_power
